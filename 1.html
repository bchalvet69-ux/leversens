<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/customize.css">
    <link rel="icon" type="image/svg+xml" href="img/leversens-logo.svg">
    <style>
      .asset-bar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 34px;
        background: #060a16;
        border-bottom: 1px solid rgba(59,130,246,0.10);
        font-family: ui-monospace, Menlo, Consolas, monospace;
        position: relative;
        z-index: 5;
      }
      .asset-bar label {
        font-size: 9px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #475569;
        font-weight: 700;
        margin-right: 4px;
      }
      .asset-btn {
        padding: 4px 14px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1px;
        border: 1px solid rgba(59,130,246,0.18);
        border-radius: 6px;
        background: transparent;
        color: #64748b;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      .asset-btn:hover {
        border-color: rgba(59,130,246,0.45);
        color: #cbd5e1;
        background: rgba(59,130,246,0.06);
      }
      .asset-btn.active {
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
        border-color: transparent;
        color: #fff;
        box-shadow: 0 2px 10px rgba(59,130,246,0.35);
      }
      .dash-page .logo2 {
        position: absolute;
        top: 4px;
        right: 14px;
        z-index: 10;
      }
    </style>
  </head>

  <body class="dash-page">
    <a class="logo2" href="index.html"></a>

    <nav class="asset-bar">
      <label>Asset</label>
      <button class="asset-btn active" data-asset="SPY">SPY</button>
      <button class="asset-btn" data-asset="BTC-USD">BTC</button>
      <button class="asset-btn" data-asset="CL=F">CL=F</button>
      <button class="asset-btn" data-asset="GOLD">GOLD</button>
      <button class="asset-btn" data-asset="NEM">NEM</button>
    </nav>

    <div class="dashboard">
      <!-- Chart 1: Global Overview -->
      <div>
        <a href="analytics/1/1.html"></a>
        <iframe src="img/1/1-1.html" data-default="img/1/1-1.html"></iframe>
      </div>

      <!-- Chart 2: Ichimoku — per asset -->
      <div>
        <a href="analytics/1/2.html"></a>
        <iframe src="img/1/2-monthly-SPY.html" data-pattern="img/1/2-monthly-{SAFE}.html"></iframe>
      </div>

      <!-- Chart 3: MACD — per asset -->
      <div>
        <a href="analytics/1/3.html"></a>
        <iframe src="img/1/3-monthly-SPY.html" data-pattern="img/1/3-monthly-{SAFE}.html"></iframe>
      </div>

      <!-- Chart 4: RSI — per asset -->
      <div>
        <a href="analytics/1/4.html"></a>
        <iframe src="img/1/4-monthly-SPY.html" data-pattern="img/1/4-monthly-{SAFE}.html"></iframe>
      </div>

      <!-- Chart 5: Bollinger — per asset -->
      <div>
        <a href="analytics/1/5.html"></a>
        <iframe src="img/1/5-monthly-SPY.html" data-pattern="img/1/5-monthly-{SAFE}.html"></iframe>
      </div>

      <!-- Chart 6: ICT + OHLC — per asset -->
      <div>
        <a href="analytics/1/6.html"></a>
        <iframe src="img/1/6-dash-SPY.html" data-pattern="img/1/6-dash-{SAFE}.html"></iframe>
      </div>
    </div>

    <script>
    (function() {
      var SAFE_MAP = {
        'SPY': 'SPY', 'BTC-USD': 'BTCUSD', 'CL=F': 'CLF', 'GOLD': 'GOLD', 'NEM': 'NEM'
      };

      document.querySelectorAll('.asset-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.asset-btn').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');

          var asset = btn.getAttribute('data-asset');
          var safe = SAFE_MAP[asset] || '';

          document.querySelectorAll('.dashboard iframe').forEach(function(iframe) {
            var pattern = iframe.getAttribute('data-pattern');
            if (pattern && safe) {
              iframe.src = pattern.replace('{SAFE}', safe);
            }
          });
        });
      });
    })();
    </script>
  </body>
</html>
